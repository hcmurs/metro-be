networks:
  metro-be:
    driver: bridge

services:
  eureka:
    container_name: eureka-server
    build:
      context: .
      dockerfile: services/eureka-service/Dockerfile
    ports:
      - "8761:8761"
    # restart: on-failure
    volumes:
      - ./logs/eureka:/logs/eureka
    networks:
      - metro-be

  gateway:
    container_name: gateway-service
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    ports:
      - "4003:4003"
    # restart: on-failure
    volumes:
      - ./logs/gateway:/logs/gateway
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - eureka
    networks:
      - metro-be

  station:
    container_name: station-service
    build:
      context: .
      dockerfile: services/station-service/Dockerfile
    ports:
      - "4004:4004"
    # restart: on-failure
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - eureka
    volumes:
      - ./logs/station:/logs/station
    networks:
      - metro-be

  auth:
    container_name: auth-service
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "4006:4006"
    # restart: on-failure
    depends_on:
      - eureka
    volumes:
      - ./logs/auth:/logs/auth
    networks:
      - metro-be

  order:
    container_name: order-service
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    ports:
      - "4008:4008"
    # restart: on-failure
    depends_on:
      - eureka
    networks:
      - metro-be

  ticket:
    container_name: ticket-service
    build:
      context: .
      dockerfile: services/ticket-service/Dockerfile
    ports:
      - "4005:4005"
    # restart: on-failure
    depends_on:
      - eureka
    networks:
      - metro-be

  user:
    container_name: user-service
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    ports:
      - "4007:4007"
    # restart: on-failure
    depends_on:
      - eureka
    networks:
      - metro-be