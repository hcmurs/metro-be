name: discovery-cd-flow

on:
  workflow_dispatch:
  push:
    branches: ["main-deployment"]
    paths:
      - "services/eureka-service/**"
      - ".github/workflows/discovery-service-cd.yml"
      - "pom.xml"

permissions:
  contents: read
  security-events: write

jobs:
  build:
    uses: ./.github/workflows/reusable-service-cd.yml
    with:
      service_name: discovery
      service_path: services/eureka-service
      image_name: lcaohoanq/metro-eureka
    secrets: inherit
