name: user-ci-flow

on:
  workflow_dispatch:
  pull_request:
    branches: ["main", "main-deployment", "develop"]
    paths:
      - "services/user-service/**"
      - ".github/workflows/user-service-ci.yml"
      - "pom.xml"
#   push:
#     branches: ["main", "main-deployment"]
#     paths:
#       - "services/user-service/**"
#       - ".github/workflows/user-service-ci.yml"
#       - "pom.xml"

jobs:
  test:
    uses: ./.github/workflows/reusable-service-ci.yml
    with:
      service_name: user
      service_path: services/user-service
      run_sonar: true
      need_eureka: true
    secrets: inherit
