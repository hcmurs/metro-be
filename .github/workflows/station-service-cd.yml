name: station-cd-flow

on:
  push:
    branches: ["main-deployment"]
    paths:
      - "services/station-service/**"
      - ".github/workflows/station-service-cd.yml"
      - "pom.xml"

jobs:
  build:
    uses: ./.github/workflows/reusable-service-cd.yml
    with:
      service_name: station
      service_path: services/station-service
      image_name: lcaohoanq/metro-station
    secrets: inherit
