name: order-ci-flow

on:
  workflow_dispatch:
  pull_request:
    branches: ["main", "main-deployment", "develop"]
    paths:
      - "services/order-service/**"
      - ".github/workflows/order-service-ci.yml"
      - "pom.xml"

#   push:
#     branches: ["main", "main-deployment"]
#     paths:
#       - "services/order-service/**"
#       - ".github/workflows/order-service-ci.yml"
#       - "pom.xml"

jobs:
  test:
    uses: ./.github/workflows/reusable-service-ci.yml
    with:
      service_name: order
      service_path: services/order-service
      run_sonar: true
    secrets: inherit
