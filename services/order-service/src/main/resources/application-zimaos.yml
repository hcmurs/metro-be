spring:
  datasource:
    url: jdbc:postgresql://metro_postgresql:5432/orderdb
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 4008

eureka:
  client:
    serviceUrl:
      defaultZone: http://metro-eureka:8762/eureka/ # Eureka Server URL

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

