spring:
  application:
    name: auth-service
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    discovery:
      enabled: true
      eureka:
        client:
          serviceUrl:
            defaultZone: http://eureka:8761/eureka/
  jackson:
    date-format: dd/MM/yyyy HH:mm:ss
    time-zone: Asia/Ho_Chi_Minh
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: http://localhost:4006/api/v1/login/oauth2/code/google
            scope: [ email, profile ]
            client-name: Google
            authorization-grant-type: authorization_code
            provider: google-custom
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID}
            client-secret: ${FACEBOOK_CLIENT_SECRET}
            redirect-uri: http://localhost:4006/api/v1/login/oauth2/code/facebook
            scope: [ email, public_profile ]
            client-name: Facebook
            authorization-grant-type: authorization_code
            provider: facebook-custom
        provider:
          google-custom:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
          facebook-custom:
            authorization-uri: https://www.facebook.com/v17.0/dialog/oauth
            token-uri: https://graph.facebook.com/v17.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/me?fields=id,name,email,picture
            user-name-attribute: id

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
  api:
    key: ${API_KEY}
    header: X-API-KEY
  oauth2:
    authorized-redirect-url-frontend: http://localhost:3000/oauth2/redirect

service:
  users:
    url: http://localhost:${service.users.port}/api/${service.users.version}/users
    port: 4007
    version: v1

app:
  version: v1

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs