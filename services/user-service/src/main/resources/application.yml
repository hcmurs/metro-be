spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: 12345
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    date-format: dd/MM/yyyy HH:mm:ss
    time-zone: Asia/Ho_Chi_Minh
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    discovery:
      enabled: true
      eureka:
        client:
          serviceUrl:
            defaultZone: http://eureka:8761/eureka/ # Eureka Server URL

server:
  port: 4007
  servlet:
    context-path: /api/${server.servlet.version}
    version: v1

security:
  api:
    key:
    header: X-API-KEY
  jwt:
    secret-key:
    expiration: 3600000 # 1 hour in milliseconds